version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecda_user
      POSTGRES_PASSWORD: ecda_password
      POSTGRES_DB: ecda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecda_user -d ecda_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
